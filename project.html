    <aside class="settings-panel" id="settingsPanel" aria-label="Settings panel">
        <div class="settings-header">
            <h2>Theme Lab</h2>
            <button id="closeSettings" aria-label="Close settings">✕</button>
        </div>

    <div class="settings-body">
        <div class="settings-group">
            <label for="themeSelect">Theme</label>
            <select id="themeSelect">
                <option value="dark">Dark Gold</option>
                <option value="light">Light</option>
                <option value="midnight">Midnight</option>
                <option value="emerald">Emerald</option>
                <option value="rose">Rose</option>
                <option value="sunset">Sunset</option>
                <option value="arctic">Arctic</option>
                <option value="lavender">Lavender</option>
                <option value="cherry">Cherry</option>
                <option value="ocean">Ocean</option>
                <option value="mono">Mono</option>
            </select>
        </div>

        <div class="settings-group">
            <label for="densitySelect">Surface</label>
            <select id="densitySelect">
                <option value="glass">Glass</option>
                <option value="solid">Solid</option>
            </select>
        </div>

        <div class="settings-group">
            <label for="fontScaleSelect">Font</label>
            <select id="fontScaleSelect">
                <option value="normal">Normal</option>
                <option value="large">Large</option>
            </select>
        </div>

        <div class="settings-group">
            <label for="animationLevel">Animation</label>
            <input type="range" id="animationLevel" min="0" max="100" value="50">
        </div>

        <div class="settings-group">
            <label for="radiusLevel">Radius</label>
            <input type="range" id="radiusLevel" min="0" max="100" value="50">
        </div>
    </div>

    <div class="settings-footer">
        <button id="resetSettings" class="button secondary">Reset</button>
        <button id="applySettings" class="button primary">Apply</button>
    </div>
</aside>
